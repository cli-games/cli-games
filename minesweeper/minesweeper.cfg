# Minesweeper configuration
#
# rows          - board height  (2..40,  default 16)
# cols          - board width   (2..80,  default 30)
# mines         - mine count    (1..rows*cols-1, default 99)
# deterministic - no-guess mode (1=on / 0=off, default 1)
#
#   When deterministic=1, the board is generated so that every cell
#   can be deduced logically – you will never be forced to guess.
#   The generator retries until a valid layout is found; on very large
#   boards or high mine densities this may take a moment.
#
#   When deterministic=0, mines are placed purely at random (classic
#   Minesweeper behaviour – guessing may be required).
#
# Preset examples:
#   Beginner    rows=9  cols=9  mines=10
#   Intermediate rows=16 cols=16 mines=40
#   Expert      rows=16 cols=30 mines=99  (default)

rows          = 16
cols          = 30
mines         = 99
deterministic = 1
